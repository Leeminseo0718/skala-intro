<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKALA Newsletter</title>
    <style>
      :root {
        --bg: #f4f7ff;
        --surface: #ffffff;
        --primary: #4f46e5;
        --text: #111827;
        --muted: #6b7280;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Pretendard", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef2ff 0%, var(--bg) 100%);
        color: var(--text);
        line-height: 1.6;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0 32px;
      }

      .brand {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .brand span { color: var(--primary); }

      .hero {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 24px;
        align-items: center;
        padding: 20px 0 36px;
      }

      .hero h1 {
        font-size: clamp(2rem, 3.5vw, 2.8rem);
        margin: 0 0 14px;
        line-height: 1.15;
      }

      .hero p {
        color: var(--muted);
        font-size: 1rem;
        margin-bottom: 20px;
      }

      .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        background: var(--primary);
        color: white;
      }

      .card {
        background: var(--surface);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(79, 70, 229, 0.12);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      input {
        padding: 12px 14px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        font-size: 1rem;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 20px;
      }

      .feature {
        background: var(--surface);
        border-radius: 16px;
        padding: 18px;
        border: 1px solid #ecefff;
      }

      footer {
        padding: 28px 0 40px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 800px) {
        .hero, .features { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">SKALA<span>.</span> NEWSLETTER</div>
        <a href="index.html" class="btn">메인으로</a>
      </header>

      <section class="hero">
        <div>
          <h1>매주 한 번, 성장의 인사이트를 전해드립니다</h1>
          <p>
            SKALA의 최신 생각, 프로젝트 소식, 실무 노하우를 담은 뉴스레터를 구독해보세요.
            유용한 정보와 새롭게 전개되는 이야기를 편하게 받아볼 수 있습니다.
          </p>
          <a href="#subscribe" class="btn">지금 구독하기</a>
        </div>

        <div class="card" id="subscribe">
          <h2>구독 신청</h2>
          <form>
            <input type="text" placeholder="이름" />
            <input type="email" placeholder="이메일" />
            <button class="btn" type="submit">구독 신청</button>
          </form>
        </div>
      </section>

      <section class="features">
        <article class="feature">
          <h3>매주 발송</h3>
          <p>핵심 인사이트를 짧고 명확하게 전달합니다.</p>
        </article>
        <article class="feature">
          <h3>실무 중심</h3>
          <p>아이디어보다 실제로 적용할 수 있는 내용을 담습니다.</p>
        </article>
        <article class="feature">
          <h3>자유로운 구독</h3>
          <p>언제든지 구독을 해지할 수 있습니다.</p>
        </article>
      </section>

      <footer>
        <p>SKALA 뉴스레터로 더 나은 소식을 만나보세요.</p>
      </footer>
    </div>
  </body>
</html>
